<svg width="400" height="300" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Lorenz Attractor Thumbnail</title>
  <desc id="desc">A stylized butterfly-shaped Lorenz attractor with gradient colors.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e1b4b" />
    </linearGradient>
    <linearGradient id="trailGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="30%" stop-color="#8b5cf6" />
      <stop offset="60%" stop-color="#ef4444" />
      <stop offset="100%" stop-color="#f97316" />
    </linearGradient>
    <linearGradient id="trailGrad2" x1="1" y1="0" x2="0" y2="0">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="30%" stop-color="#06b6d4" />
      <stop offset="60%" stop-color="#8b5cf6" />
      <stop offset="100%" stop-color="#ef4444" />
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f97316" stop-opacity="0.8" />
      <stop offset="50%" stop-color="#f97316" stop-opacity="0.2" />
      <stop offset="100%" stop-color="#f97316" stop-opacity="0" />
    </radialGradient>
    <filter id="blur">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.5" />
    </filter>
  </defs>

  <rect x="0" y="0" width="400" height="300" fill="url(#bg)" />

  <!-- Right wing (outer loop) -->
  <ellipse cx="260" cy="155" rx="85" ry="75" fill="none" stroke="url(#trailGrad)" stroke-width="2" opacity="0.3" transform="rotate(-10 260 155)" />
  <ellipse cx="260" cy="155" rx="70" ry="60" fill="none" stroke="url(#trailGrad)" stroke-width="2.5" opacity="0.5" transform="rotate(-10 260 155)" />
  <ellipse cx="260" cy="155" rx="55" ry="45" fill="none" stroke="url(#trailGrad)" stroke-width="2" opacity="0.4" transform="rotate(-10 260 155)" />
  <ellipse cx="260" cy="155" rx="40" ry="30" fill="none" stroke="url(#trailGrad)" stroke-width="1.5" opacity="0.3" transform="rotate(-10 260 155)" />

  <!-- Left wing (outer loop) -->
  <ellipse cx="140" cy="155" rx="85" ry="75" fill="none" stroke="url(#trailGrad2)" stroke-width="2" opacity="0.3" transform="rotate(10 140 155)" />
  <ellipse cx="140" cy="155" rx="70" ry="60" fill="none" stroke="url(#trailGrad2)" stroke-width="2.5" opacity="0.5" transform="rotate(10 140 155)" />
  <ellipse cx="140" cy="155" rx="55" ry="45" fill="none" stroke="url(#trailGrad2)" stroke-width="2" opacity="0.4" transform="rotate(10 140 155)" />
  <ellipse cx="140" cy="155" rx="40" ry="30" fill="none" stroke="url(#trailGrad2)" stroke-width="1.5" opacity="0.3" transform="rotate(10 140 155)" />

  <!-- Connecting figure-8 path through center -->
  <path d="M200,155 C220,120 300,80 330,155 C360,230 220,230 200,155 C180,80 40,80 70,155 C100,230 180,190 200,155"
    fill="none" stroke="url(#trailGrad)" stroke-width="3" opacity="0.8" filter="url(#blur)" />
  <path d="M200,155 C215,130 290,95 320,155 C350,215 215,210 200,155 C185,100 50,95 80,155 C110,215 185,180 200,155"
    fill="none" stroke="url(#trailGrad2)" stroke-width="2.5" opacity="0.7" />
  <path d="M200,155 C210,140 275,115 300,155 C325,195 210,195 200,155 C190,115 75,115 100,155 C125,195 190,175 200,155"
    fill="none" stroke="#a855f7" stroke-width="2" opacity="0.5" />

  <!-- Glowing current point -->
  <circle cx="200" cy="155" r="12" fill="url(#glow)" />
  <circle cx="200" cy="155" r="3" fill="#fff" />

  <!-- Title text -->
  <text x="200" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#f1f5f9">
    Lorenz Attractor
  </text>
  <text x="200" y="58" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#94a3b8">
    Deterministic Chaos
  </text>

  <text x="200" y="285" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#64748b">
    dx/dt = &#x03C3;(y&#x2212;x)   dy/dt = x(&#x03C1;&#x2212;z)&#x2212;y   dz/dt = xy&#x2212;&#x03B2;z
  </text>
</svg>
