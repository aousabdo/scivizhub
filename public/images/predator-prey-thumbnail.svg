<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f0fdf4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ecfdf5;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="preyGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#16a34a;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#22c55e;stop-opacity:0.9" />
    </linearGradient>
    <linearGradient id="predGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#dc2626;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#ef4444;stop-opacity:0.9" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="300" rx="12" fill="url(#bgGrad)" />
  <rect x="1" y="1" width="398" height="298" rx="12" fill="none" stroke="#d1d5db" stroke-width="1.5" />

  <!-- Subtle grid -->
  <g stroke="#e5e7eb" stroke-width="0.5" opacity="0.6">
    <line x1="50" y1="40" x2="50" y2="240" />
    <line x1="120" y1="40" x2="120" y2="240" />
    <line x1="190" y1="40" x2="190" y2="240" />
    <line x1="260" y1="40" x2="260" y2="240" />
    <line x1="330" y1="40" x2="330" y2="240" />
    <line x1="50" y1="80" x2="370" y2="80" />
    <line x1="50" y1="140" x2="370" y2="140" />
    <line x1="50" y1="200" x2="370" y2="200" />
  </g>

  <!-- Axes -->
  <line x1="50" y1="40" x2="50" y2="240" stroke="#9ca3af" stroke-width="1.5" />
  <line x1="50" y1="240" x2="370" y2="240" stroke="#9ca3af" stroke-width="1.5" />

  <!-- Prey population curve (green, sinusoidal) -->
  <path d="M 50 140 C 70 80, 90 60, 120 70 C 150 80, 160 140, 190 180 C 220 220, 235 230, 260 200 C 285 140, 290 80, 320 70 C 340 65, 355 100, 370 140"
        fill="none" stroke="url(#preyGrad)" stroke-width="3" stroke-linecap="round" />

  <!-- Prey area fill -->
  <path d="M 50 140 C 70 80, 90 60, 120 70 C 150 80, 160 140, 190 180 C 220 220, 235 230, 260 200 C 285 140, 290 80, 320 70 C 340 65, 355 100, 370 140 L 370 240 L 50 240 Z"
        fill="#16a34a" opacity="0.08" />

  <!-- Predator population curve (red, sinusoidal, phase-shifted) -->
  <path d="M 50 170 C 75 140, 100 80, 140 75 C 170 70, 185 110, 210 170 C 235 220, 255 230, 280 210 C 305 160, 315 90, 345 80 C 355 77, 365 100, 370 120"
        fill="none" stroke="url(#predGrad)" stroke-width="3" stroke-linecap="round" />

  <!-- Predator area fill -->
  <path d="M 50 170 C 75 140, 100 80, 140 75 C 170 70, 185 110, 210 170 C 235 220, 255 230, 280 210 C 305 160, 315 90, 345 80 C 355 77, 365 100, 370 120 L 370 240 L 50 240 Z"
        fill="#dc2626" opacity="0.06" />

  <!-- Rabbit silhouettes (simple) -->
  <!-- Rabbit 1 near prey peak -->
  <g transform="translate(105, 52)" fill="#16a34a" opacity="0.7">
    <ellipse cx="0" cy="0" rx="6" ry="4.5" />
    <ellipse cx="5" cy="-2" rx="3" ry="2" />
    <ellipse cx="3" cy="-7" rx="1.2" ry="4" />
    <ellipse cx="6" cy="-7" rx="1.2" ry="3.5" />
  </g>
  <!-- Rabbit 2 -->
  <g transform="translate(310, 58)" fill="#16a34a" opacity="0.7">
    <ellipse cx="0" cy="0" rx="6" ry="4.5" />
    <ellipse cx="5" cy="-2" rx="3" ry="2" />
    <ellipse cx="3" cy="-7" rx="1.2" ry="4" />
    <ellipse cx="6" cy="-7" rx="1.2" ry="3.5" />
  </g>

  <!-- Wolf silhouettes (simple) -->
  <!-- Wolf 1 near predator peak -->
  <g transform="translate(128, 62)" fill="#dc2626" opacity="0.7">
    <ellipse cx="0" cy="0" rx="8" ry="5" />
    <ellipse cx="7" cy="-2" rx="4" ry="3" />
    <polygon points="5,-5 4,-10 7,-6" />
    <polygon points="8,-5 7,-10 10,-6" />
    <line x1="-8" y1="0" x2="-14" y2="-2" stroke="#dc2626" stroke-width="1.5" />
  </g>
  <!-- Wolf 2 -->
  <g transform="translate(335, 68)" fill="#dc2626" opacity="0.7">
    <ellipse cx="0" cy="0" rx="8" ry="5" />
    <ellipse cx="7" cy="-2" rx="4" ry="3" />
    <polygon points="5,-5 4,-10 7,-6" />
    <polygon points="8,-5 7,-10 10,-6" />
    <line x1="-8" y1="0" x2="-14" y2="-2" stroke="#dc2626" stroke-width="1.5" />
  </g>

  <!-- Legend -->
  <rect x="55" y="248" width="12" height="3" rx="1.5" fill="#16a34a" />
  <text x="72" y="253" font-family="sans-serif" font-size="11" fill="#374151" font-weight="500">Prey</text>
  <rect x="110" y="248" width="12" height="3" rx="1.5" fill="#dc2626" />
  <text x="127" y="253" font-family="sans-serif" font-size="11" fill="#374151" font-weight="500">Predators</text>

  <!-- Title -->
  <text x="200" y="275" font-family="sans-serif" font-size="14" fill="#374151" font-weight="700" text-anchor="middle">Predator-Prey Dynamics</text>
  <text x="200" y="292" font-family="sans-serif" font-size="10" fill="#6b7280" text-anchor="middle">Lotka-Volterra Ecosystem Model</text>
</svg>
