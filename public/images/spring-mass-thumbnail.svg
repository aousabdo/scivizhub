<svg width="400" height="300" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Spring-Mass System Thumbnail</title>
  <desc id="desc">A chain of colored masses connected by zigzag springs anchored to a wall.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e1b4b" />
    </linearGradient>
    <linearGradient id="wallGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#334155" />
      <stop offset="100%" stop-color="#475569" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.3" />
    </filter>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="400" height="300" fill="url(#bg)" />

  <!-- Subtle grid -->
  <g stroke="#1e293b" stroke-width="0.5" opacity="0.5">
    <line x1="0" y1="150" x2="400" y2="150" />
    <line x1="50" y1="0" x2="50" y2="300" stroke-dasharray="4,4" />
  </g>

  <!-- Wall -->
  <rect x="0" y="40" width="30" height="220" fill="url(#wallGrad)" rx="2" />
  <!-- Wall hatch lines -->
  <g stroke="#94a3b8" stroke-width="1" opacity="0.4">
    <line x1="5" y1="55" x2="25" y2="40" />
    <line x1="5" y1="75" x2="25" y2="60" />
    <line x1="5" y1="95" x2="25" y2="80" />
    <line x1="5" y1="115" x2="25" y2="100" />
    <line x1="5" y1="135" x2="25" y2="120" />
    <line x1="5" y1="155" x2="25" y2="140" />
    <line x1="5" y1="175" x2="25" y2="160" />
    <line x1="5" y1="195" x2="25" y2="180" />
    <line x1="5" y1="215" x2="25" y2="200" />
    <line x1="5" y1="235" x2="25" y2="220" />
    <line x1="5" y1="255" x2="25" y2="240" />
  </g>

  <!-- Spring 1: wall to mass 1 -->
  <polyline
    points="30,150 38,150 44,136 56,164 68,136 80,164 92,136 104,164 110,150 120,150"
    fill="none" stroke="#94a3b8" stroke-width="2.5" stroke-linejoin="round" />

  <!-- Mass 1 -->
  <circle cx="140" cy="150" r="22" fill="#3b82f6" filter="url(#shadow)" />
  <circle cx="140" cy="150" r="22" fill="none" stroke="#60a5fa" stroke-width="2" opacity="0.6" />
  <text x="140" y="155" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="white">m1</text>

  <!-- Spring 2: mass 1 to mass 2 (slightly stretched) -->
  <polyline
    points="162,150 170,150 178,133 194,167 210,133 226,167 242,133 250,150 258,150"
    fill="none" stroke="#94a3b8" stroke-width="2.5" stroke-linejoin="round" />

  <!-- Mass 2 -->
  <circle cx="278" cy="150" r="22" fill="#ef4444" filter="url(#shadow)" />
  <circle cx="278" cy="150" r="22" fill="none" stroke="#f87171" stroke-width="2" opacity="0.6" />
  <text x="278" y="155" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="white">m2</text>

  <!-- Spring 3: mass 2 to mass 3 (compressed) -->
  <polyline
    points="300,150 305,150 310,140 320,160 330,140 340,160 345,150 350,150"
    fill="none" stroke="#94a3b8" stroke-width="2.5" stroke-linejoin="round" />

  <!-- Mass 3 -->
  <circle cx="368" cy="150" r="22" fill="#22c55e" filter="url(#shadow)" />
  <circle cx="368" cy="150" r="22" fill="none" stroke="#4ade80" stroke-width="2" opacity="0.6" />
  <text x="368" y="155" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="white">m3</text>

  <!-- Motion arrows -->
  <g filter="url(#glow)" opacity="0.7">
    <!-- Mass 1 moving right -->
    <path d="M155,115 L170,115 L165,108 M170,115 L165,122" fill="none" stroke="#60a5fa" stroke-width="2" />
    <!-- Mass 2 moving left -->
    <path d="M263,115 L248,115 L253,108 M248,115 L253,122" fill="none" stroke="#f87171" stroke-width="2" />
    <!-- Mass 3 moving right -->
    <path d="M383,115 L398,115 L393,108 M398,115 L393,122" fill="none" stroke="#4ade80" stroke-width="2" />
  </g>

  <!-- Energy bar at bottom -->
  <rect x="40" y="260" width="320" height="12" rx="6" fill="#3b82f6" opacity="0.8" />
  <rect x="40" y="260" width="140" height="12" rx="6" fill="#ef4444" opacity="0.8" />
  <text x="110" y="256" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#f87171">KE</text>
  <text x="250" y="256" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#60a5fa">PE</text>

  <!-- Title -->
  <text x="200" y="28" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#f1f5f9">
    Coupled Spring-Mass System
  </text>
</svg>
