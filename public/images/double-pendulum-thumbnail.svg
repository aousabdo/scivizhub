<svg width="1200" height="675" viewBox="0 0 1200 675" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Double Pendulum &amp; Chaos Theory Thumbnail</title>
  <desc id="desc">A double pendulum with colorful chaotic trail traces.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e1b4b" />
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="1200" height="675" fill="url(#bg)" />

  <text x="600" y="76" text-anchor="middle" font-family="Arial, sans-serif" font-size="52" font-weight="700" fill="#f1f5f9">
    Double Pendulum
  </text>
  <text x="600" y="116" text-anchor="middle" font-family="Arial, sans-serif" font-size="26" fill="#94a3b8">
    Chaos Theory in Motion
  </text>

  <!-- Pivot point -->
  <circle cx="600" cy="200" r="8" fill="#94a3b8" />

  <!-- Arm 1 -->
  <line x1="600" y1="200" x2="480" y2="360" stroke="#e2e8f0" stroke-width="6" stroke-linecap="round" />
  <!-- Joint -->
  <circle cx="480" cy="360" r="14" fill="#3b82f6" stroke="#1d4ed8" stroke-width="3" />

  <!-- Arm 2 -->
  <line x1="480" y1="360" x2="560" y2="510" stroke="#e2e8f0" stroke-width="5" stroke-linecap="round" />
  <!-- Bob -->
  <circle cx="560" cy="510" r="12" fill="#f97316" stroke="#ea580c" stroke-width="3" />

  <!-- Chaotic trail -->
  <path d="M560,510 Q620,540 640,480 T700,420 T680,350 T740,300 T780,380 T820,450 T790,520 T830,560 T880,500 T920,420 T900,350 T940,300 T960,380 T940,460 T980,520"
    fill="none" stroke="url(#trail1)" stroke-width="3" opacity="0.8" />
  <linearGradient id="trail1" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#f97316" />
    <stop offset="25%" stop-color="#ef4444" />
    <stop offset="50%" stop-color="#a855f7" />
    <stop offset="75%" stop-color="#3b82f6" />
    <stop offset="100%" stop-color="#06b6d4" />
  </linearGradient>

  <!-- Second trail (ghost pendulum) -->
  <path d="M560,510 Q510,550 470,500 T400,440 T380,370 T340,310 T300,380 T280,460 T310,530 T270,570 T230,510 T200,430 T220,360 T180,310 T160,390 T180,470 T140,530"
    fill="none" stroke="url(#trail2)" stroke-width="2.5" opacity="0.5" />
  <linearGradient id="trail2" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#f97316" />
    <stop offset="25%" stop-color="#ec4899" />
    <stop offset="50%" stop-color="#8b5cf6" />
    <stop offset="75%" stop-color="#6366f1" />
    <stop offset="100%" stop-color="#22d3ee" />
  </linearGradient>

  <text x="600" y="635" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" fill="#64748b">
    Sensitive dependence on initial conditions
  </text>
</svg>
