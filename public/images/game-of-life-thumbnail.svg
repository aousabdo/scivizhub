<svg width="1200" height="675" viewBox="0 0 1200 675" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Game of Life Thumbnail</title>
  <desc id="desc">Conway's Game of Life grid with gliders and oscillators in colorful cells.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e1b4b" />
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="1200" height="675" fill="url(#bg)" />

  <text x="600" y="60" text-anchor="middle" font-family="Arial, sans-serif" font-size="52" font-weight="700" fill="#f1f5f9">
    Game of Life
  </text>
  <text x="600" y="96" text-anchor="middle" font-family="Arial, sans-serif" font-size="26" fill="#94a3b8">
    Cellular Automata &#x26; Emergent Complexity
  </text>

  <!-- Grid lines -->
  <g stroke="rgba(148,163,184,0.15)" stroke-width="1">
    <!-- Vertical lines -->
    <line x1="150" y1="120" x2="150" y2="600" /><line x1="180" y1="120" x2="180" y2="600" />
    <line x1="210" y1="120" x2="210" y2="600" /><line x1="240" y1="120" x2="240" y2="600" />
    <line x1="270" y1="120" x2="270" y2="600" /><line x1="300" y1="120" x2="300" y2="600" />
    <line x1="330" y1="120" x2="330" y2="600" /><line x1="360" y1="120" x2="360" y2="600" />
    <line x1="390" y1="120" x2="390" y2="600" /><line x1="420" y1="120" x2="420" y2="600" />
    <line x1="450" y1="120" x2="450" y2="600" /><line x1="480" y1="120" x2="480" y2="600" />
    <line x1="510" y1="120" x2="510" y2="600" /><line x1="540" y1="120" x2="540" y2="600" />
    <line x1="570" y1="120" x2="570" y2="600" /><line x1="600" y1="120" x2="600" y2="600" />
    <line x1="630" y1="120" x2="630" y2="600" /><line x1="660" y1="120" x2="660" y2="600" />
    <line x1="690" y1="120" x2="690" y2="600" /><line x1="720" y1="120" x2="720" y2="600" />
    <line x1="750" y1="120" x2="750" y2="600" /><line x1="780" y1="120" x2="780" y2="600" />
    <line x1="810" y1="120" x2="810" y2="600" /><line x1="840" y1="120" x2="840" y2="600" />
    <line x1="870" y1="120" x2="870" y2="600" /><line x1="900" y1="120" x2="900" y2="600" />
    <line x1="930" y1="120" x2="930" y2="600" /><line x1="960" y1="120" x2="960" y2="600" />
    <line x1="990" y1="120" x2="990" y2="600" /><line x1="1020" y1="120" x2="1020" y2="600" />
    <line x1="1050" y1="120" x2="1050" y2="600" />
    <!-- Horizontal lines -->
    <line x1="150" y1="120" x2="1050" y2="120" /><line x1="150" y1="150" x2="1050" y2="150" />
    <line x1="150" y1="180" x2="1050" y2="180" /><line x1="150" y1="210" x2="1050" y2="210" />
    <line x1="150" y1="240" x2="1050" y2="240" /><line x1="150" y1="270" x2="1050" y2="270" />
    <line x1="150" y1="300" x2="1050" y2="300" /><line x1="150" y1="330" x2="1050" y2="330" />
    <line x1="150" y1="360" x2="1050" y2="360" /><line x1="150" y1="390" x2="1050" y2="390" />
    <line x1="150" y1="420" x2="1050" y2="420" /><line x1="150" y1="450" x2="1050" y2="450" />
    <line x1="150" y1="480" x2="1050" y2="480" /><line x1="150" y1="510" x2="1050" y2="510" />
    <line x1="150" y1="540" x2="1050" y2="540" /><line x1="150" y1="570" x2="1050" y2="570" />
    <line x1="150" y1="600" x2="1050" y2="600" />
  </g>

  <!-- Glider (top-left area) - bright green (new) -->
  <rect x="211" y="181" width="28" height="28" rx="3" fill="#22c55e" opacity="0.95" />
  <rect x="241" y="211" width="28" height="28" rx="3" fill="#22c55e" opacity="0.95" />
  <rect x="181" y="241" width="28" height="28" rx="3" fill="#4ade80" opacity="0.85" />
  <rect x="211" y="241" width="28" height="28" rx="3" fill="#4ade80" opacity="0.85" />
  <rect x="241" y="241" width="28" height="28" rx="3" fill="#22c55e" opacity="0.95" />

  <!-- Block (still life) - yellow/older -->
  <rect x="781" y="151" width="28" height="28" rx="3" fill="#eab308" opacity="0.8" />
  <rect x="811" y="151" width="28" height="28" rx="3" fill="#eab308" opacity="0.8" />
  <rect x="781" y="181" width="28" height="28" rx="3" fill="#eab308" opacity="0.8" />
  <rect x="811" y="181" width="28" height="28" rx="3" fill="#eab308" opacity="0.8" />

  <!-- Blinker (oscillator) - teal -->
  <rect x="481" y="331" width="28" height="28" rx="3" fill="#06b6d4" opacity="0.9" />
  <rect x="511" y="331" width="28" height="28" rx="3" fill="#06b6d4" opacity="0.9" />
  <rect x="541" y="331" width="28" height="28" rx="3" fill="#06b6d4" opacity="0.9" />

  <!-- Pulsar fragment (center-right) -->
  <g opacity="0.85">
    <rect x="691" y="331" width="28" height="28" rx="3" fill="#a855f7" />
    <rect x="721" y="331" width="28" height="28" rx="3" fill="#a855f7" />
    <rect x="751" y="331" width="28" height="28" rx="3" fill="#a855f7" />
    <rect x="691" y="391" width="28" height="28" rx="3" fill="#8b5cf6" />
    <rect x="751" y="391" width="28" height="28" rx="3" fill="#8b5cf6" />
    <rect x="691" y="421" width="28" height="28" rx="3" fill="#7c3aed" />
    <rect x="721" y="421" width="28" height="28" rx="3" fill="#7c3aed" />
    <rect x="751" y="421" width="28" height="28" rx="3" fill="#7c3aed" />
  </g>

  <!-- R-pentomino (orange, active) -->
  <rect x="361" y="451" width="28" height="28" rx="3" fill="#f97316" opacity="0.9" />
  <rect x="391" y="451" width="28" height="28" rx="3" fill="#f97316" opacity="0.9" />
  <rect x="331" y="481" width="28" height="28" rx="3" fill="#fb923c" opacity="0.8" />
  <rect x="361" y="481" width="28" height="28" rx="3" fill="#f97316" opacity="0.9" />
  <rect x="361" y="511" width="28" height="28" rx="3" fill="#fb923c" opacity="0.8" />

  <!-- Random scatter -->
  <g opacity="0.6">
    <rect x="871" y="391" width="28" height="28" rx="3" fill="#22c55e" />
    <rect x="901" y="421" width="28" height="28" rx="3" fill="#4ade80" />
    <rect x="931" y="391" width="28" height="28" rx="3" fill="#86efac" />
    <rect x="901" y="481" width="28" height="28" rx="3" fill="#22c55e" />
    <rect x="871" y="511" width="28" height="28" rx="3" fill="#4ade80" />
    <rect x="931" y="511" width="28" height="28" rx="3" fill="#22c55e" />
  </g>

  <!-- Labels -->
  <text x="225" y="175" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#86efac">Glider</text>
  <text x="810" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#fbbf24">Block</text>
  <text x="525" y="325" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#22d3ee">Blinker</text>

  <text x="600" y="645" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#64748b">
    Generation 142 &#x2022; Population 47
  </text>
</svg>
