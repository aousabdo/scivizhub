<svg width="400" height="300" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Voronoi Diagram Thumbnail</title>
  <desc id="desc">A stylized Voronoi tessellation with colorful pastel regions and seed points.</desc>

  <defs>
    <clipPath id="frame">
      <rect x="0" y="0" width="400" height="300" rx="8" />
    </clipPath>
  </defs>

  <g clip-path="url(#frame)">
    <!-- Background -->
    <rect x="0" y="0" width="400" height="300" fill="#f1f5f9" />

    <!-- Voronoi cells as polygons with pastel fills -->
    <polygon points="0,0 95,0 80,55 45,80 0,70" fill="#FFB3BA" stroke="#94a3b8" stroke-width="1.2" />
    <polygon points="95,0 200,0 185,40 140,65 80,55" fill="#FFDFBA" stroke="#94a3b8" stroke-width="1.2" />
    <polygon points="200,0 310,0 290,50 230,60 185,40" fill="#FFFFBA" stroke="#94a3b8" stroke-width="1.2" />
    <polygon points="310,0 400,0 400,80 350,75 290,50" fill="#BAFFC9" stroke="#94a3b8" stroke-width="1.2" />
    <polygon points="0,70 45,80 60,140 30,170 0,150" fill="#BAE1FF" stroke="#94a3b8" stroke-width="1.2" />
    <polygon points="45,80 80,55 140,65 150,120 60,140" fill="#DABAFE" stroke="#94a3b8" stroke-width="1.2" />
    <polygon points="140,65 185,40 230,60 220,120 150,120" fill="#FFBAF3" stroke="#94a3b8" stroke-width="1.2" />
    <polygon points="230,60 290,50 350,75 330,130 270,125 220,120" fill="#BAFFFF" stroke="#94a3b8" stroke-width="1.2" />
    <polygon points="350,75 400,80 400,160 370,155 330,130" fill="#FFD2A0" stroke="#94a3b8" stroke-width="1.2" />
    <polygon points="0,150 30,170 50,230 0,240" fill="#C8FFBA" stroke="#94a3b8" stroke-width="1.2" />
    <polygon points="30,170 60,140 150,120 160,190 100,210 50,230" fill="#BAC8FF" stroke="#94a3b8" stroke-width="1.2" />
    <polygon points="150,120 220,120 240,185 160,190" fill="#FFDCDC" stroke="#94a3b8" stroke-width="1.2" />
    <polygon points="220,120 270,125 300,180 240,185" fill="#E0FFBA" stroke="#94a3b8" stroke-width="1.2" />
    <polygon points="270,125 330,130 370,155 360,190 300,180" fill="#BAFFD2" stroke="#94a3b8" stroke-width="1.2" />
    <polygon points="370,155 400,160 400,240 380,230 360,190" fill="#D2BAFF" stroke="#94a3b8" stroke-width="1.2" />
    <polygon points="0,240 50,230 100,210 110,270 60,300 0,300" fill="#FFFABA" stroke="#94a3b8" stroke-width="1.2" />
    <polygon points="100,210 160,190 180,260 110,270" fill="#FFB3D9" stroke="#94a3b8" stroke-width="1.2" />
    <polygon points="160,190 240,185 260,250 180,260" fill="#B3FFE0" stroke="#94a3b8" stroke-width="1.2" />
    <polygon points="240,185 300,180 320,245 260,250" fill="#E0D4FF" stroke="#94a3b8" stroke-width="1.2" />
    <polygon points="300,180 360,190 380,230 355,260 320,245" fill="#FFE0BA" stroke="#94a3b8" stroke-width="1.2" />
    <polygon points="380,230 400,240 400,300 355,300 355,260" fill="#BADCFF" stroke="#94a3b8" stroke-width="1.2" />
    <polygon points="60,300 110,270 180,260 260,250 320,245 355,260 355,300" fill="#FFD4E0" stroke="#94a3b8" stroke-width="1.2" />

    <!-- Seed points -->
    <g fill="#1e293b" stroke="#ffffff" stroke-width="1.5">
      <circle cx="50" cy="35" r="4" />
      <circle cx="140" cy="30" r="4" />
      <circle cx="250" cy="32" r="4" />
      <circle cx="345" cy="40" r="4" />
      <circle cx="25" cy="110" r="4" />
      <circle cx="105" cy="95" r="4" />
      <circle cx="185" cy="90" r="4" />
      <circle cx="290" cy="95" r="4" />
      <circle cx="380" cy="115" r="4" />
      <circle cx="20" cy="195" r="4" />
      <circle cx="110" cy="170" r="4" />
      <circle cx="190" cy="155" r="4" />
      <circle cx="265" cy="155" r="4" />
      <circle cx="340" cy="165" r="4" />
      <circle cx="390" cy="195" r="4" />
      <circle cx="65" cy="255" r="4" />
      <circle cx="145" cy="240" r="4" />
      <circle cx="220" cy="230" r="4" />
      <circle cx="305" cy="220" r="4" />
      <circle cx="370" cy="240" r="4" />
    </g>

    <!-- Subtle Delaunay triangulation lines on a few central cells -->
    <g stroke="#ef4444" stroke-width="0.8" stroke-dasharray="4 3" opacity="0.35">
      <line x1="105" y1="95" x2="185" y2="90" />
      <line x1="185" y1="90" x2="190" y2="155" />
      <line x1="105" y1="95" x2="190" y2="155" />
      <line x1="190" y1="155" x2="265" y2="155" />
      <line x1="185" y1="90" x2="265" y2="155" />
      <line x1="185" y1="90" x2="290" y2="95" />
      <line x1="290" y1="95" x2="265" y2="155" />
      <line x1="110" y1="170" x2="190" y2="155" />
      <line x1="110" y1="170" x2="145" y2="240" />
      <line x1="190" y1="155" x2="220" y2="230" />
    </g>
  </g>

  <!-- Title overlay -->
  <text x="200" y="285" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="600" fill="#334155" opacity="0.8">
    Voronoi Diagram
  </text>
</svg>
