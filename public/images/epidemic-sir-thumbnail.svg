<svg width="1200" height="675" viewBox="0 0 1200 675" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Epidemic SIR Model Simulator Thumbnail</title>
  <desc id="desc">SIR curves showing susceptible, infected, and recovered populations over time.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc" />
      <stop offset="100%" stop-color="#ecfdf5" />
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="1200" height="675" fill="url(#bg)" />

  <text x="600" y="76" text-anchor="middle" font-family="Arial, sans-serif" font-size="52" font-weight="700" fill="#0f172a">
    Epidemic SIR Model
  </text>
  <text x="600" y="116" text-anchor="middle" font-family="Arial, sans-serif" font-size="26" fill="#334155">
    Susceptible &#xB7; Infected &#xB7; Recovered
  </text>

  <!-- Axes -->
  <line x1="150" y1="560" x2="1050" y2="560" stroke="#94a3b8" stroke-width="3" />
  <line x1="150" y1="160" x2="150" y2="560" stroke="#94a3b8" stroke-width="3" />

  <!-- Axis labels -->
  <text x="600" y="610" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" fill="#64748b">Time (days)</text>
  <text x="80" y="360" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" fill="#64748b" transform="rotate(-90,80,360)">Population</text>

  <!-- S curve (blue, declining) -->
  <path d="M150,180 Q300,185 400,210 T550,350 T700,480 T850,530 T1050,545"
    fill="none" stroke="#3b82f6" stroke-width="5" stroke-linecap="round" />

  <!-- I curve (red, bell-shaped) -->
  <path d="M150,550 Q300,545 400,500 T520,320 T600,230 T680,220 T750,280 T850,430 T950,510 T1050,540"
    fill="none" stroke="#ef4444" stroke-width="5" stroke-linecap="round" />

  <!-- R curve (green, rising) -->
  <path d="M150,555 Q300,553 400,545 T550,480 T700,340 T850,230 T1050,185"
    fill="none" stroke="#22c55e" stroke-width="5" stroke-linecap="round" />

  <!-- Legend -->
  <rect x="820" y="140" width="24" height="24" rx="4" fill="#3b82f6" />
  <text x="854" y="160" font-family="Arial, sans-serif" font-size="22" fill="#1e3a8a">Susceptible</text>

  <rect x="820" y="175" width="24" height="24" rx="4" fill="#ef4444" />
  <text x="854" y="195" font-family="Arial, sans-serif" font-size="22" fill="#991b1b">Infected</text>

  <rect x="820" y="210" width="24" height="24" rx="4" fill="#22c55e" />
  <text x="854" y="230" font-family="Arial, sans-serif" font-size="22" fill="#166534">Recovered</text>

  <!-- R0 badge -->
  <rect x="180" y="140" width="120" height="50" rx="12" fill="#fef3c7" stroke="#f59e0b" stroke-width="2" />
  <text x="240" y="173" text-anchor="middle" font-family="Arial, sans-serif" font-size="26" font-weight="700" fill="#92400e">R0 = 2.5</text>
</svg>
