<svg width="1200" height="675" viewBox="0 0 1200 675" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Gravity Simulator Thumbnail</title>
  <desc id="desc">Orbital paths of planets around a star with gravitational attraction.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0c0a1a" />
      <stop offset="100%" stop-color="#1a1035" />
    </linearGradient>
    <radialGradient id="starglow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fbbf24" />
      <stop offset="40%" stop-color="#f59e0b" stop-opacity="0.6" />
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0" />
    </radialGradient>
  </defs>

  <rect x="0" y="0" width="1200" height="675" fill="url(#bg)" />

  <!-- Stars background -->
  <g fill="white" opacity="0.4">
    <circle cx="100" cy="80" r="1.5" /><circle cx="300" cy="50" r="1" /><circle cx="500" cy="120" r="1.5" />
    <circle cx="700" cy="40" r="1" /><circle cx="900" cy="90" r="1.5" /><circle cx="1100" cy="60" r="1" />
    <circle cx="150" cy="600" r="1" /><circle cx="400" cy="580" r="1.5" /><circle cx="800" cy="620" r="1" />
    <circle cx="1050" cy="550" r="1.5" /><circle cx="50" cy="350" r="1" /><circle cx="1150" cy="300" r="1" />
  </g>

  <!-- Orbital paths -->
  <ellipse cx="500" cy="340" rx="120" ry="110" fill="none" stroke="rgba(59,130,246,0.3)" stroke-width="2" stroke-dasharray="8 4" />
  <ellipse cx="500" cy="340" rx="220" ry="190" fill="none" stroke="rgba(34,197,94,0.25)" stroke-width="2" stroke-dasharray="8 4" />
  <ellipse cx="500" cy="340" rx="340" ry="260" fill="none" stroke="rgba(168,85,247,0.2)" stroke-width="2" stroke-dasharray="8 4" />

  <!-- Central star with glow -->
  <circle cx="500" cy="340" r="80" fill="url(#starglow)" />
  <circle cx="500" cy="340" r="30" fill="#fbbf24" />

  <!-- Planet 1 (blue) -->
  <circle cx="380" cy="340" r="12" fill="#3b82f6" />
  <!-- Trail -->
  <path d="M380,340 Q380,230 500,230" fill="none" stroke="#3b82f6" stroke-width="2" opacity="0.5" />

  <!-- Planet 2 (green) -->
  <circle cx="720" cy="340" r="16" fill="#22c55e" />
  <path d="M720,340 Q720,530 500,530" fill="none" stroke="#22c55e" stroke-width="2" opacity="0.4" />

  <!-- Planet 3 (purple) -->
  <circle cx="500" cy="80" r="10" fill="#a855f7" />
  <path d="M500,80 Q160,80 160,340" fill="none" stroke="#a855f7" stroke-width="2" opacity="0.3" />

  <!-- Gravitational force arrows -->
  <line x1="405" y1="340" x2="460" y2="340" stroke="#fbbf24" stroke-width="2" opacity="0.6" />
  <polygon points="460,340 450,336 450,344" fill="#fbbf24" opacity="0.6" />

  <!-- Second system (binary) -->
  <circle cx="960" cy="300" r="18" fill="#f97316" />
  <circle cx="1020" cy="380" r="14" fill="#ef4444" />
  <ellipse cx="990" cy="340" rx="50" ry="60" fill="none" stroke="rgba(249,115,22,0.3)" stroke-width="1.5" />

  <text x="600" y="60" text-anchor="middle" font-family="Arial, sans-serif" font-size="52" font-weight="700" fill="#f1f5f9">
    Gravity Simulator
  </text>
  <text x="600" y="96" text-anchor="middle" font-family="Arial, sans-serif" font-size="26" fill="#94a3b8">
    N-Body Orbital Mechanics
  </text>

  <text x="600" y="645" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#64748b">
    F = G m1 m2 / r&#xB2;
  </text>
</svg>
