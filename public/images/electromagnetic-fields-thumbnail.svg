<svg width="1200" height="675" viewBox="0 0 1200 675" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Electromagnetic Fields Thumbnail</title>
  <desc id="desc">Electric field lines flowing between positive and negative charges.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e293b" />
    </linearGradient>
    <radialGradient id="posGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ef4444" stop-opacity="0.6" />
      <stop offset="100%" stop-color="#ef4444" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="negGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.6" />
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0" />
    </radialGradient>
  </defs>

  <rect x="0" y="0" width="1200" height="675" fill="url(#bg)" />

  <text x="600" y="60" text-anchor="middle" font-family="Arial, sans-serif" font-size="52" font-weight="700" fill="#f1f5f9">
    Electric Fields
  </text>
  <text x="600" y="96" text-anchor="middle" font-family="Arial, sans-serif" font-size="26" fill="#94a3b8">
    Coulomb's Law &#x26; Field Lines
  </text>

  <!-- Positive charge glow -->
  <circle cx="380" cy="340" r="100" fill="url(#posGlow)" />
  <!-- Negative charge glow -->
  <circle cx="820" cy="340" r="100" fill="url(#negGlow)" />

  <!-- Field lines from + to - (dipole pattern) -->
  <g fill="none" stroke-width="2.5" opacity="0.7">
    <path d="M420,340 Q600,340 780,340" stroke="#f9a8d4" />
    <path d="M420,320 Q600,280 780,320" stroke="#c084fc" />
    <path d="M420,360 Q600,400 780,360" stroke="#c084fc" />
    <path d="M410,300 Q600,200 790,300" stroke="#818cf8" />
    <path d="M410,380 Q600,480 790,380" stroke="#818cf8" />
    <path d="M400,270 Q600,120 800,270" stroke="#67e8f9" />
    <path d="M400,410 Q600,560 800,410" stroke="#67e8f9" />
    <path d="M390,240 Q500,80 700,80 Q810,80 810,240" stroke="#6ee7b7" opacity="0.5" />
    <path d="M390,440 Q500,600 700,600 Q810,600 810,440" stroke="#6ee7b7" opacity="0.5" />
  </g>

  <!-- Field arrows along lines -->
  <g fill="#f9a8d4" opacity="0.8">
    <polygon points="560,336 548,330 548,342" />
    <polygon points="640,336 628,330 628,342" />
  </g>
  <g fill="#c084fc" opacity="0.7">
    <polygon points="560,293 548,287 548,299" />
    <polygon points="560,387 548,381 548,393" />
  </g>

  <!-- Positive charge -->
  <circle cx="380" cy="340" r="30" fill="#ef4444" stroke="#fca5a5" stroke-width="3" />
  <text x="380" y="352" text-anchor="middle" font-family="Arial, sans-serif" font-size="36" font-weight="700" fill="white">+</text>

  <!-- Negative charge -->
  <circle cx="820" cy="340" r="30" fill="#3b82f6" stroke="#93c5fd" stroke-width="3" />
  <text x="820" y="350" text-anchor="middle" font-family="Arial, sans-serif" font-size="36" font-weight="700" fill="white">&#x2212;</text>

  <!-- Voltage info -->
  <text x="600" y="640" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#64748b">
    E = kQ / r&#xB2;
  </text>
</svg>
