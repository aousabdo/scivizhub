<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#818cf8"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Orbital rings (science/atom theme) -->
  <ellipse cx="256" cy="256" rx="160" ry="60" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="8" transform="rotate(-30 256 256)"/>
  <ellipse cx="256" cy="256" rx="160" ry="60" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="8" transform="rotate(30 256 256)"/>
  <ellipse cx="256" cy="256" rx="160" ry="60" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="8" transform="rotate(90 256 256)"/>

  <!-- Data visualization bars (chart element) -->
  <rect x="188" y="260" width="32" height="80" rx="6" fill="rgba(255,255,255,0.9)"/>
  <rect x="240" y="220" width="32" height="120" rx="6" fill="white"/>
  <rect x="292" y="190" width="32" height="150" rx="6" fill="rgba(255,255,255,0.9)"/>

  <!-- Center dot / nucleus -->
  <circle cx="256" cy="170" r="18" fill="white"/>

  <!-- Electron dots on orbits -->
  <circle cx="140" cy="180" r="10" fill="url(#glow)"/>
  <circle cx="372" cy="332" r="10" fill="url(#glow)"/>
  <circle cx="256" cy="100" r="10" fill="url(#glow)"/>
</svg>
