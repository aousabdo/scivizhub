<svg width="1200" height="675" viewBox="0 0 1200 675" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Binary Search Tree Thumbnail</title>
  <desc id="desc">A balanced binary search tree with color-coded nodes and edges.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc" />
      <stop offset="100%" stop-color="#f0fdf4" />
    </linearGradient>
    <linearGradient id="nodeGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#1d4ed8" />
    </linearGradient>
    <linearGradient id="highlightGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fbbf24" />
      <stop offset="100%" stop-color="#f59e0b" />
    </linearGradient>
    <linearGradient id="foundGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22c55e" />
      <stop offset="100%" stop-color="#16a34a" />
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="1200" height="675" fill="url(#bg)" />

  <text x="600" y="66" text-anchor="middle" font-family="Arial, sans-serif" font-size="52" font-weight="700" fill="#0f172a">
    Binary Search Tree
  </text>
  <text x="600" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="26" fill="#334155">
    Insert, Search, Delete &#x26; AVL Balancing
  </text>

  <!-- Edges -->
  <g stroke="#94a3b8" stroke-width="3">
    <!-- Root to children -->
    <line x1="600" y1="180" x2="380" y2="280" />
    <line x1="600" y1="180" x2="820" y2="280" />
    <!-- Level 2 -->
    <line x1="380" y1="280" x2="260" y2="380" />
    <line x1="380" y1="280" x2="500" y2="380" />
    <line x1="820" y1="280" x2="700" y2="380" />
    <line x1="820" y1="280" x2="940" y2="380" />
    <!-- Level 3 -->
    <line x1="260" y1="380" x2="200" y2="480" />
    <line x1="260" y1="380" x2="320" y2="480" />
    <line x1="700" y1="380" x2="640" y2="480" />
    <line x1="940" y1="380" x2="1000" y2="480" />
  </g>

  <!-- Highlighted search path -->
  <line x1="600" y1="180" x2="820" y2="280" stroke="#fbbf24" stroke-width="5" opacity="0.6" />
  <line x1="820" y1="280" x2="700" y2="380" stroke="#fbbf24" stroke-width="5" opacity="0.6" />
  <line x1="700" y1="380" x2="640" y2="480" stroke="#fbbf24" stroke-width="5" opacity="0.6" />

  <!-- Root node (50) -->
  <circle cx="600" cy="180" r="32" fill="url(#nodeGrad)" />
  <text x="600" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="26" font-weight="700" fill="white">50</text>

  <!-- Level 1 -->
  <circle cx="380" cy="280" r="32" fill="url(#nodeGrad)" />
  <text x="380" y="290" text-anchor="middle" font-family="Arial, sans-serif" font-size="26" font-weight="700" fill="white">30</text>

  <circle cx="820" cy="280" r="32" fill="url(#highlightGrad)" />
  <text x="820" y="290" text-anchor="middle" font-family="Arial, sans-serif" font-size="26" font-weight="700" fill="white">70</text>

  <!-- Level 2 -->
  <circle cx="260" cy="380" r="32" fill="url(#nodeGrad)" />
  <text x="260" y="390" text-anchor="middle" font-family="Arial, sans-serif" font-size="26" font-weight="700" fill="white">20</text>

  <circle cx="500" cy="380" r="32" fill="url(#nodeGrad)" />
  <text x="500" y="390" text-anchor="middle" font-family="Arial, sans-serif" font-size="26" font-weight="700" fill="white">40</text>

  <circle cx="700" cy="380" r="32" fill="url(#highlightGrad)" />
  <text x="700" y="390" text-anchor="middle" font-family="Arial, sans-serif" font-size="26" font-weight="700" fill="white">60</text>

  <circle cx="940" cy="380" r="32" fill="url(#nodeGrad)" />
  <text x="940" y="390" text-anchor="middle" font-family="Arial, sans-serif" font-size="26" font-weight="700" fill="white">80</text>

  <!-- Level 3 -->
  <circle cx="200" cy="480" r="32" fill="url(#nodeGrad)" />
  <text x="200" y="490" text-anchor="middle" font-family="Arial, sans-serif" font-size="26" font-weight="700" fill="white">10</text>

  <circle cx="320" cy="480" r="32" fill="url(#nodeGrad)" />
  <text x="320" y="490" text-anchor="middle" font-family="Arial, sans-serif" font-size="26" font-weight="700" fill="white">25</text>

  <circle cx="640" cy="480" r="32" fill="url(#foundGrad)" />
  <text x="640" y="490" text-anchor="middle" font-family="Arial, sans-serif" font-size="26" font-weight="700" fill="white">55</text>

  <circle cx="1000" cy="480" r="32" fill="url(#nodeGrad)" />
  <text x="1000" y="490" text-anchor="middle" font-family="Arial, sans-serif" font-size="26" font-weight="700" fill="white">90</text>

  <!-- Search label -->
  <rect x="420" y="555" width="360" height="50" rx="12" fill="#dcfce7" stroke="#22c55e" stroke-width="2" />
  <text x="600" y="588" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="600" fill="#166534">
    Search(55) &#x2192; Found!
  </text>
</svg>
