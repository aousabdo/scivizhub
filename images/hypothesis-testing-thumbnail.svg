<svg width="1200" height="675" viewBox="0 0 1200 675" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Hypothesis Testing Thumbnail</title>
  <desc id="desc">Overlapping normal distributions showing null and alternative hypotheses with rejection regions.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc" />
      <stop offset="100%" stop-color="#eff6ff" />
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="1200" height="675" fill="url(#bg)" />

  <text x="600" y="76" text-anchor="middle" font-family="Arial, sans-serif" font-size="52" font-weight="700" fill="#0f172a">
    Hypothesis Testing
  </text>
  <text x="600" y="116" text-anchor="middle" font-family="Arial, sans-serif" font-size="26" fill="#334155">
    p-values, Power, and Statistical Decisions
  </text>

  <!-- Axes -->
  <line x1="100" y1="500" x2="1100" y2="500" stroke="#94a3b8" stroke-width="3" />

  <!-- H0 distribution (blue) -->
  <path d="M100,500 Q200,498 280,490 Q340,475 380,440 Q420,390 440,330 Q460,260 480,210 Q500,180 520,175 Q540,180 560,210 Q580,260 600,330 Q620,390 660,440 Q700,475 760,490 Q840,498 940,500"
    fill="rgba(59,130,246,0.15)" stroke="#3b82f6" stroke-width="4" />

  <!-- H1 distribution (orange, shifted right) -->
  <path d="M360,500 Q460,498 540,490 Q600,475 640,440 Q680,390 700,330 Q720,260 740,220 Q760,195 780,190 Q800,195 820,220 Q840,260 860,330 Q880,390 920,440 Q960,475 1020,490 Q1060,498 1100,500"
    fill="rgba(249,115,22,0.15)" stroke="#f97316" stroke-width="4" />

  <!-- Alpha rejection region (red shading on right tail of H0) -->
  <path d="M760,490 Q800,475 820,455 Q840,430 860,400 Q880,370 900,350 Q920,340 940,500 Z"
    fill="rgba(239,68,68,0.3)" stroke="none" />

  <!-- Critical value line -->
  <line x1="760" y1="150" x2="760" y2="500" stroke="#ef4444" stroke-width="3" stroke-dasharray="10 6" />
  <text x="760" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#ef4444">
    Critical Value
  </text>

  <!-- Labels -->
  <text x="520" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#3b82f6">H&#x2080;</text>
  <text x="780" y="175" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#f97316">H&#x2081;</text>

  <!-- Legend boxes -->
  <rect x="140" y="555" width="200" height="45" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="2" />
  <text x="240" y="584" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="600" fill="#1e3a8a">&#x3B1; = 0.05</text>

  <rect x="380" y="555" width="200" height="45" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2" />
  <text x="480" y="584" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="600" fill="#92400e">Power = 0.80</text>

  <rect x="620" y="555" width="200" height="45" rx="8" fill="#fee2e2" stroke="#ef4444" stroke-width="2" />
  <text x="720" y="584" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="600" fill="#991b1b">p-value</text>

  <rect x="860" y="555" width="200" height="45" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2" />
  <text x="960" y="584" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="600" fill="#166534">Reject H&#x2080;</text>
</svg>
