<svg width="1200" height="675" viewBox="0 0 1200 675" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Chemical Reaction Kinetics Thumbnail</title>
  <desc id="desc">Animated molecules colliding with concentration curves and reaction equation.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc" />
      <stop offset="100%" stop-color="#faf5ff" />
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="1200" height="675" fill="url(#bg)" />

  <text x="600" y="76" text-anchor="middle" font-family="Arial, sans-serif" font-size="52" font-weight="700" fill="#0f172a">
    Reaction Kinetics
  </text>
  <text x="600" y="116" text-anchor="middle" font-family="Arial, sans-serif" font-size="26" fill="#334155">
    Molecular Collisions &amp; Equilibrium
  </text>

  <!-- Molecule area (left side) -->
  <rect x="100" y="150" width="440" height="380" rx="16" fill="#fefce8" stroke="#facc15" stroke-width="2" />

  <!-- Reactant molecules (A = blue circles) -->
  <circle cx="180" cy="240" r="22" fill="#3b82f6" opacity="0.9" />
  <text x="180" y="248" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="white">A</text>
  <circle cx="300" cy="200" r="22" fill="#3b82f6" opacity="0.9" />
  <text x="300" y="208" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="white">A</text>
  <circle cx="420" cy="280" r="22" fill="#3b82f6" opacity="0.9" />
  <text x="420" y="288" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="white">A</text>
  <circle cx="230" cy="350" r="22" fill="#3b82f6" opacity="0.7" />
  <text x="230" y="358" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="white">A</text>

  <!-- Product molecules (B = orange circles) -->
  <circle cx="370" cy="380" r="22" fill="#f97316" opacity="0.9" />
  <text x="370" y="388" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="white">B</text>
  <circle cx="460" cy="440" r="22" fill="#f97316" opacity="0.9" />
  <text x="460" y="448" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="white">B</text>
  <circle cx="170" cy="460" r="22" fill="#f97316" opacity="0.9" />
  <text x="170" y="468" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="white">B</text>

  <!-- Collision spark -->
  <text x="320" y="310" text-anchor="middle" font-family="Arial, sans-serif" font-size="36" fill="#eab308">&#9733;</text>

  <!-- Concentration plot (right side) -->
  <rect x="620" y="150" width="480" height="380" rx="16" fill="white" stroke="#e2e8f0" stroke-width="2" />

  <!-- Plot axes -->
  <line x1="680" y1="480" x2="1050" y2="480" stroke="#94a3b8" stroke-width="2" />
  <line x1="680" y1="190" x2="680" y2="480" stroke="#94a3b8" stroke-width="2" />
  <text x="865" y="510" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#64748b">Time</text>
  <text x="655" y="340" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#64748b" transform="rotate(-90,655,340)">[Conc]</text>

  <!-- [A] decreasing curve -->
  <path d="M680,210 Q760,215 820,280 T920,400 T1040,450"
    fill="none" stroke="#3b82f6" stroke-width="4" stroke-linecap="round" />

  <!-- [B] increasing curve -->
  <path d="M680,470 Q760,465 820,400 T920,280 T1040,230"
    fill="none" stroke="#f97316" stroke-width="4" stroke-linecap="round" />

  <!-- Legend in plot -->
  <line x1="920" y1="195" x2="955" y2="195" stroke="#3b82f6" stroke-width="4" />
  <text x="965" y="202" font-family="Arial, sans-serif" font-size="20" fill="#3b82f6">[A]</text>
  <line x1="920" y1="220" x2="955" y2="220" stroke="#f97316" stroke-width="4" />
  <text x="965" y="227" font-family="Arial, sans-serif" font-size="20" fill="#f97316">[B]</text>

  <!-- Reaction equation -->
  <text x="600" y="610" text-anchor="middle" font-family="Arial, sans-serif" font-size="36" font-weight="700" fill="#7c3aed">
    A &#8652; B
  </text>
  <text x="600" y="645" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#64748b">
    k&#8321; forward &amp; k&#8322; reverse
  </text>
</svg>
